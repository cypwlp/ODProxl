name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    # 僅當推送的是 tag 時才執行（雙重保障）
    if: startsWith(github.ref, 'refs/tags/v')
    name: Publish for ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            executable: ODProxl.exe
          - os: macos-15-intel
            rid: osx-x64
            executable: ODProxl
          - os: macos-latest
            rid: osx-arm64
            executable: ODProxl
          - os: ubuntu-22.04
            rid: linux-x64
            executable: ODProxl

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 desktop-file-utils libglib2.0-bin

      # Platform-specific icon conversion and environment variables
      - name: Prepare Icon and Platform Flags
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            choco install imagemagick -y
            magick convert ./ODProxl/Assets/app-icon.png -define icon:auto-resize=256,128,64,48,32,16 ./ODProxl/Assets/app-icon.ico
            echo "ICON=./ODProxl/Assets/app-icon.ico" >> $GITHUB_ENV
            echo "BUNDLE_ID=" >> $GITHUB_ENV
          elif [ "$RUNNER_OS" == "macOS" ]; then
            mkdir -p AppIcon.iconset
            sips -z 16 16 ODProxl/Assets/app-icon.png --out AppIcon.iconset/icon_16x16.png
            sips -z 32 32 ODProxl/Assets/app-icon.png --out AppIcon.iconset/icon_16x16@2x.png
            sips -z 32 32 ODProxl/Assets/app-icon.png --out AppIcon.iconset/icon_32x32.png
            sips -z 64 64 ODProxl/Assets/app-icon.png --out AppIcon.iconset/icon_32x32@2x.png
            sips -z 128 128 ODProxl/Assets/app-icon.png --out AppIcon.iconset/icon_128x128.png
            sips -z 256 256 ODProxl/Assets/app-icon.png --out AppIcon.iconset/icon_128x128@2x.png
            sips -z 256 256 ODProxl/Assets/app-icon.png --out AppIcon.iconset/icon_256x256.png
            sips -z 512 512 ODProxl/Assets/app-icon.png --out AppIcon.iconset/icon_256x256@2x.png
            sips -z 512 512 ODProxl/Assets/app-icon.png --out AppIcon.iconset/icon_512x512.png
            sips -z 1024 1024 ODProxl/Assets/app-icon.png --out AppIcon.iconset/icon_512x512@2x.png
            iconutil -c icns AppIcon.iconset -o ODProxl/Assets/app-icon.icns
            echo "ICON=./ODProxl/Assets/app-icon.icns" >> $GITHUB_ENV
            echo "BUNDLE_ID=--bundleId com.cypilu.ODProxl" >> $GITHUB_ENV
          else # Linux
            echo "ICON=./ODProxl/Assets/app-icon.png" >> $GITHUB_ENV
            echo "BUNDLE_ID=" >> $GITHUB_ENV
          fi

      - name: Publish Application
        run: dotnet publish -c Release --runtime ${{ matrix.rid }} --self-contained true -o ./publish

      - name: Sync Previous Releases (Delta Updates)
        continue-on-error: true
        run: |
          vpk download github --repoUrl https://github.com/${{ github.repository }} --outputDir ./Releases

      - name: Velopack Pack
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          vpk pack \
            --packId "ODProxl" \
            --packVersion "$VERSION" \
            --packDir "./publish" \
            --mainExe "${{ matrix.executable }}" \
            --icon "${{ env.ICON }}" \
            ${{ env.BUNDLE_ID }} \
            --channel "${{ matrix.rid }}" \
            --outputDir "./Releases"

      # macOS: rename Velopack artifacts to include the correct RID
      - name: Rename macOS Artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd ./Releases
          
          # Rename main artifacts (nupkg, delta, etc.)
          for f in ODProxl-*-osx-*; do
            if [ -f "$f" ]; then
              newname=$(echo "$f" | sed "s/-osx-/-${{ matrix.rid }}-/")
              mv "$f" "$newname"
            fi
          done
          
          # Rename RELEASES and json files
          [ -f "RELEASES-osx" ] && mv "RELEASES-osx" "RELEASES-${{ matrix.rid }}"
          [ -f "releases.osx.json" ] && mv "releases.osx.json" "releases.${{ matrix.rid }}.json"
          
          # Rename Portable.zip and Setup.pkg
          [ -f "ODProxl-osx-Portable.zip" ] && mv "ODProxl-osx-Portable.zip" "ODProxl-${{ matrix.rid }}-Portable.zip"
          [ -f "ODProxl-osx-Setup.pkg" ] && mv "ODProxl-osx-Setup.pkg" "ODProxl-${{ matrix.rid }}-Setup.pkg"
          
          cd ..

      - name: List Release Directory
        run: ls -la ./Releases
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./Releases/*.exe
            ./Releases/*.nupkg
            ./Releases/*.pkg
            ./Releases/*.zip
            ./Releases/*.AppImage
            ./Releases/RELEASES*
            ./Releases/releases.*.json
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload artifact for later merging
      - name: Upload Artifact (Releases)
        uses: actions/upload-artifact@v4
        with:
          name: releases-${{ matrix.rid }}
          path: ./Releases
          if-no-files-found: error

  # 同步所有平台產物到國內 WebDAV 伺服器
  sync-to-china:
    name: Sync to China Server (WebDAV)
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all_releases

      - name: Merge Releases
        run: |
          mkdir -p ./merged_releases
          for rid_dir in ./all_releases/releases-*; do
            if [ -d "$rid_dir" ]; then
              echo "Copying $rid_dir to ./merged_releases"
              cp -r "$rid_dir"/* ./merged_releases/
            fi
          done
          ls -la ./merged_releases

      - name: Sync via WebDAV (rclone)
        env:
          WEBDAV_URL: ${{ secrets.WEBDAV_BASE_URL }}
          WEBDAV_USER: ${{ secrets.SERVER_USER }}
          WEBDAV_PASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          if [ -z "$WEBDAV_URL" ] || [ -z "$WEBDAV_USER" ] || [ -z "$WEBDAV_PASS" ]; then
            echo "ERROR: WebDAV credentials not set."
            exit 1
          fi

          # 安裝 rclone
          curl -fsSL https://rclone.org/install.sh | sudo bash

          # 配置 rclone
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [webdav]
          type = webdav
          url = $WEBDAV_URL
          vendor = other
          user = $WEBDAV_USER
          pass = $(rclone obscure "$WEBDAV_PASS")
          EOF

          # 優化後的 sync 指令（提升傳輸速度）
          rclone sync ./merged_releases webdav:/ \
            --progress \
            --transfers 12 \
            --checkers 24 \
            --multi-thread-streams 4 \
            --buffer-size 64M \
            --vfs-read-chunk-size 64M \
            --timeout 10m \
            --contimeout 2m \
            --retries 10 \
            --low-level-retries 20 \
            --retries-sleep 15s \
            --no-checksum \
            --fast-list \
            --size-only